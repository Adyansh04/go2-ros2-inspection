# Flatten the L1 3D cloud (/utlidar/cloud_deskewed) to a 2D /scan for slam_toolbox + Nav2.
# Height band is taken around base_link so walls/obstacles in the robot's plane are kept.
/**:
  ros__parameters:
    use_sim_time: true
    target_frame: base_link        # flatten into the body frame
    transform_tolerance: 0.1
    # Height band for the costmap obstacle_layer, measured in base_link. base_link sits at the gait
    # nominal_height (~0.225m), so the floor is at ~base_link z=-0.225. The L1 is also pitched ~8.6 deg
    # down (utlidar rpy 0 0.15 0), raking the floor a few metres out, so the lower bound must keep a
    # margin above the floor (including gait bob) to avoid leaking phantom ground obstacles into the
    # costmap, while still seeing every real obstacle (walls 1.6m, tables 0.7-0.9m).
    min_height: -0.02
    max_height:  0.60
    # Full 360 deg (matches the real L1 and the gz 360 deg gpu_lidar). The reading count must satisfy
    # pointcloud_to_laserscan's ceil((max-min)/inc) == slam_toolbox/Karto's round()+1, otherwise Karto
    # rejects every scan: 2*pi/0.0087 = 722.2 -> ceil=723, round+1=723.
    angle_min: -3.14159           # -180 deg
    angle_max:  3.14159           # +180 deg
    angle_increment: 0.0087        # ~0.5 deg  (723 readings)
    scan_time: 0.1
    range_min: 0.15              # small dead zone: the dog's body is already removed by self_filter (ADR-013)
    range_max: 25.0
    use_inf: true
    inf_epsilon: 1.0
