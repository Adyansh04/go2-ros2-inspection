# Nav2 (Jazzy) for the Go2 — 2D, lean for the Orin (ADR-009). No AMCL: slam_toolbox owns
# map->odom. allow_unknown:true so the planner can head toward frontiers into unmapped space.
# Costmaps use /scan (the L1 cloud flattened). Footprint ~ Go2 (0.40 x 0.20 m).

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 100   # ms. Budget for a BtActionNode to get the server to ACCEPT a freshly sent
                                  # goal (the async_send_goal acknowledgment handshake -- NOT a cap on action
                                  # execution; createPlan runs on a separate std::async worker bounded by
                                  # action_server_result_timeout ~900 s). The elapsed accept time accumulates
                                  # across 10 ms BT ticks and the node FAILS once it exceeds this value. Sized
                                  # generously for this CPU-loaded sim: the planner_server's single executor also
                                  # does the once-per-second full ~270k-cell global-costmap serialize/publish
                                  # (always_send_full_costmap below), so a tight budget let one goal-accept queue
                                  # past it on the ~1 Hz replan and abort a valid in-flight goal. 100 ms gives
                                  # ~5x margin over that periodic busy window while staying ~10x below the 1 s
                                  # replan period, so a genuinely dead server is still caught in <=100 ms before
                                  # recovery. Global default for every BtActionNode (compute_path/follow_path/
                                  # spin/backup/...); only relaxes the liveness guard, touches no safety check.
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0    # MPPI needs period (1/freq=0.05) <= model_dt (0.05)
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001    # Go2 is holonomic (can strafe) -> don't zero small lateral odom/cmds
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.4
      movement_time_allowance: 20.0   # generous: the robot turns in place to face goals behind it (no
                                       # translation during the turn), so a tighter window can trip the
                                       # progress checker mid-turn with a false "Failed to make progress".
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.40    # accept arriving NEAR the frontier rather than pinpoint; lateral trim is slow
                                 #   (vy capped low for face-and-go), so a tight tolerance can leave the robot
                                 #   stalled just outside the goal and abort on a follow_path ack-timeout.
      yaw_goal_tolerance: 3.15   # ignore final heading: a frontier goal carries no meaningful yaw, and
                                 #   enforcing one makes the controller spin in place at the goal.
      stateful: true
    # The active controller is DWB (the uncommented 'FollowPath:' block further below). The MPPI
    # FollowPath block is preserved commented-out as an alternative. controller_plugins binds to
    # whichever 'FollowPath:' key is uncommented, so keep exactly one active at a time.
#     FollowPath:
#       # MPPI (Model Predictive Path Integral) — Nav2's sampling-based MPC local controller. Suited to the
#       # Go2 because (1) its native "Omni" motion model samples vx+vy+wz jointly (DWB bolts lateral on via
#       # vy_samples and rarely picks it), (2) it optimises over a 2.0 s receding horizon so it can plan
#       # multi-phase extraction maneuvers (reverse -> rotate -> strafe out of a wedge) that DWB's single
#       # 1.5 s rollout cannot, and (3) reverse is a first-class sampled control (vx_min<0) gated by
#       # PreferForwardCritic, so the robot backs up only to escape, never as default travel.
#       # Docs: https://docs.nav2.org/configuration/packages/configuring-mppic.html
#       # MPPI handles its own rotation (a RotationShimController wrapper chattered on this maze's jagged
#       # NavFn path), so the tuning below simply sizes the sampling stds for maneuverability.
#       plugin: "nav2_mppi_controller::MPPIController"
#
#       # --- horizon & sampling -- sized for real-time 20 Hz -------------------------------------------
#       # MPPI must finish each optimisation within 1/controller_frequency (0.05 s). A larger time_steps /
#       # batch_size with consider_footprint=true collapses the loop to 5-10 Hz on this machine; a starved
#       # MPPI produces no usable trajectory -> "Failed to make progress" -> the BT fires a SPIN recovery
#       # and the robot dithers. The values below hold a steady ~20 Hz with no rate-miss / recovery events.
#       time_steps: 40          # 40 * 0.05 = 2.0 s horizon (plenty at 0.26 m/s).
#       model_dt: 0.05          # integration step; must be >= 1/controller_frequency (1/20 = 0.05).
#       batch_size: 1000        # trajectories per cycle; keeps the loop real-time while staying dense enough
#                               #   to plan turns/strafes. Raise only if you have CPU headroom.
#       # SAMPLING STD DEVS — the std is how widely MPPI explores each velocity axis: it can only execute a
#       # maneuver it actually samples. Too large (the Nav2 default, tuned for a vx_max=0.5/wz_max=1.9 robot)
#       # makes the slow Go2 jitter (vy_std would exceed vy_max!). Too small is smooth but the robot can no
#       # longer sample a strafe or a brisk turn. The values below balance the two, scaled to the Go2's small
#       # envelope. (Some straight-line wz wiggle is the unavoidable cost of keeping enough rotational
#       # sampling on a robot this slow.)
#       vx_std: 0.15            # forward exploration (~0.58 of vx_max).
#       vy_std: 0.08            # lateral exploration -- large enough to actually sample a strafe (vy_max 0.12)
#                               #   yet narrow enough to attenuate corridor crab-walk: the executed command is
#                               #   the softmax-weighted mean over the batch (control.vy = sum(cvy * softmaxes),
#                               #   not the argmin), so a narrower vy noise cloud leaks less spurious lateral vy
#                               #   onto /cmd_vel while the body is angled toward an around-the-corner goal.
#                               #   Stays > the strafe floor and < vy_max (preserves the vy_std<vy_max anti-jitter
#                               #   invariant). This only reduces the crab; the root cause (heading-agnostic
#                               #   PathAlign+PathFollow satisfiable by free strafe under the Omni model) is left
#                               #   in place to preserve holonomic extraction. Eliminating it entirely needs
#                               #   motion_model:=DiffDrive (drops vy -> robot must face travel dir). Do NOT lower
#                               #   PathAngleCritic.max_angle_to_furthest to "fix" this -- it engages the off-axis
#                               #   heading pull sooner (parks the body more off-axis) and does nothing on the
#                               #   straightaway; it is the wrong lever.
#       wz_std: 0.30            # yaw exploration. Must be ample (~0.6 of wz_max) or MPPI can't sample a brisk
#                               #   in-place turn and the robot won't rotate to face goals.
#
#       # --- kinodynamic limits (MATCH the Go2 trot; same envelope as the old DWB block) --------------
#       vx_max: 0.26            # forward trot max.
#       vx_min: -0.15           # reverse enabled -- sim L1 is full 360 deg so the costmap sees behind us.
#                               #   Modest magnitude: the Go2 reverse trot is less stable than forward.
#                               #   *** REAL-ROBOT: the physical L1 is front-biased. Set vx_min: 0.0 before
#                               #   any real deployment or the robot reverses blind. Sim-only here. ***
#       vy_max: 0.12            # strafe; Omni samples vy in [-vy_max, vy_max]. Capped to limit worst-case
#                               #   lateral-leak / diagonal-walk amplitude in the corridor crab-walk without
#                               #   disabling strafe (vy_max != 0 -> tight-space reverse->rotate->strafe extraction
#                               #   preserved). Kept >> vy_std (0.12 vs 0.08) so the strafe sample cloud isn't
#                               #   wider than the limit.
#       wz_max: 0.5             # yaw rate (== behavior_server max_rotational_vel; enough for in-place reorient).
#       ax_max: 0.6             # fwd accel.
#       ax_min: -0.6            # fwd decel.
#       ay_max: 0.6             # lateral accel.
#       ay_min: -0.6            # lateral decel -- must be set explicitly. The Omni motion model bounds vy with
#                               #   both ay_min and ay_max (the per-step vy clamp uses model_dt*ay_min on the low
#                               #   side). Left unset, ay_min defaults to -3.0 -- far looser than ay_max and off
#                               #   the Go2 trot envelope -- so MPPI could sample lateral decelerations the CHAMP
#                               #   gait can't physically track. Mirror ay_max with the symmetric +/-0.6 pattern.
#       az_max: 1.0             # yaw accel. Keeping accels realistic stops MPPI proposing trajectories the
#                               #   CHAMP gait can't physically track.
#
#       # --- optimiser ---------------------------------------------------------------------------------
#       iteration_count: 1      # MPPI optimisation passes per cycle (1 is standard; the horizon recedes).
#       prune_distance: 1.7     # how far along the global path to track each cycle (m).
#       transform_tolerance: 3.0   # RTAB-Map localization republishes map->odom at 20 Hz but only advances the
#                               #   stamp at its ~2 Hz processing rate, so map->odom intermittently lags sim-now.
#                               #   A tight tolerance makes the controller's goal-pose transform hit "Lookup
#                               #   would require extrapolation into the future" and abort every goal. 3.0 s
#                               #   absorbs the lag spikes. (TF/time-class fix.)
#       temperature: 0.3        # softmax selectiveness over trajectory costs (lower = greedier). Default.
#       gamma: 0.015            # control-effort penalty (smoothness). Default.
#       motion_model: "DiffDrive"    # holonomic Go2 -> sample vx+vy+wz. ("DiffDrive" would drop vy.)
#       visualize: false        # off by default: publishing the trajectory MarkerArray cuts the control rate
#                               #   noticeably and a starved controller hunts more (docs: "slows compute time
#                               #   significantly ... not suggested during deployed use"). To see trajectories
#                               #   in RViz on demand (the display is already in go2_full.rviz):
#                               #     ros2 param set /controller_server FollowPath.visualize true
#                               #   ...then set it false again for clean 20 Hz driving.
#       regenerate_noises: true # fresh Gaussian noise each cycle (better tight-space sampling; sim CPU is ok).
#       TrajectoryVisualizer:
#         trajectory_step: 5
#         time_step: 3
#       AckermannConstraints:
#         min_turning_r: 0.0    # unused by the Omni model; harmless.
#
#       critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic",
#                 "PreferForwardCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic",
#                 "TwirlingCritic"]
#
#       ConstraintCritic:       # keep samples inside the velocity/accel envelope above.
#         enabled: true
#         cost_power: 1
#         cost_weight: 4.0
#       CostCritic:             # obstacle avoidance straight from the costmap.
#         enabled: true
#         cost_power: 1
#         cost_weight: 3.81
#         critical_cost: 300.0
#         consider_footprint: false  # circular check. Full-polygon footprint collision over batch*time_steps
#                                    #   points tips the loop below 20 Hz and starves MPPI. false = cheaper
#                                    #   ~circumscribed-radius check. Trade-off: the robot is treated as a
#                                    #   ~0.38 m circle so it won't try to squeeze sideways through gaps <~0.76 m;
#                                    #   reliable real-time control is worth more than tight-gap squeezing.
#                                    #   (Costmap inflation still avoids walls.)
#         collision_cost: 1000000.0
#         near_goal_distance: 1.0
#       GoalCritic:             # pull toward the goal point.
#         enabled: true
#         cost_power: 1
#         cost_weight: 5.0
#         threshold_to_consider: 0.6   # doc rule: set Goal & PathFollow threshold_to_consider == the prediction-
#                                      #   horizon distance for a clean PathFollow->Goal hand-off. This robot's
#                                      #   horizon distance is vx_max*horizon = 0.26*2.0 = 0.52 m, so 0.6 (just
#                                      #   above it, and > xy_goal_tolerance) keeps GoalCritic from pulling
#                                      #   straight at the goal early and overriding path geometry through the
#                                      #   approach. Must stay paired with PathFollow's value.
#       GoalAngleCritic:        # achieve final heading. LOW weight + acts only within 0.5 m: frontier goals
#         enabled: true         #   carry NO meaningful yaw (goal_checker yaw_tol=3.15), so don't let it
#         cost_power: 1         #   force a spin on arrival.
#         cost_weight: 3.0
#         threshold_to_consider: 0.5
#       PreferForwardCritic:    # the "prefer rotating over reversing" dial. cost = sum(max(-vx,0))*dt*weight --
#         enabled: true         #   it taxes only reverse vx; in-place rotation (vx~0,wz!=0) is free to it. So
#         cost_power: 1         #   with PathAngleCritic mode 0 (below) making a rear path costly, rotate-to-face
#         cost_weight: 3.0      #   beats reverse. Weight is the trade dial: too high and at a straight-behind
#         threshold_to_consider: 0.5  # ~180 goal it refuses reverse but can't break the rotation symmetry and
#                               #   dithers; this value keeps reverse as a graceful last-resort fallback so the
#                               #   robot reaches the goal instead of stalling. Skipped within 0.5 m of goal
#                               #   (lets it back up to dock). *** REAL-ROBOT: raise to ~5 AND set vx_min: 0.0 --
#                               #   the front-biased L1 can't see behind, so free reverse is sim-only. ***
#       PathAlignCritic:        # stay ON the (now centre-biased) NavFn path. PRIMARY anti-wall-hug term:
#         enabled: true         #   MPPI tracks the centred global plan instead of cutting corners.
#         cost_power: 1
#         cost_weight: 14.0
#         max_path_occupancy_ratio: 0.05
#         trajectory_point_step: 4
#         threshold_to_consider: 0.5
#         offset_from_furthest: 4    # the Nav2 default (20) silently disables this critic on this robot.
#                                    #   PathAlignCritic::score() gates on
#                                    #   `if (furthest_reached_path_point < offset_from_furthest_) return;`, where
#                                    #   furthest_reached_path_point = the path index nearest the furthest-reaching
#                                    #   trajectory endpoint. This robot's horizon reaches vx_max*horizon =
#                                    #   0.26*2.0 = 0.52 m = ~10 path points @ 0.05 m (NavFn native spacing), so
#                                    #   furthest-reached ~= 10 < 20 every cycle -> early return -> PathAlign scores
#                                    #   zero. Doc baseline = horizon_s*vx_max/path_res/3 ~= 3.5; 4 puts the scored
#                                    #   window [4..~10] inside the reachable horizon without the local-minima-at-
#                                    #   tracking-start regime. If the robot over-aligns (hugs path too hard),
#                                    #   lower cost_weight toward ~10.
#         use_path_orientations: false   # the frontier path has no meaningful per-point yaw.
#       PathFollowCritic:       # make progress toward the furthest reachable path point.
#         enabled: true
#         cost_power: 1
#         cost_weight: 5.0
#         offset_from_furthest: 5
#         threshold_to_consider: 0.6   # paired with GoalCritic above at the ~0.52 m horizon distance: a larger
#                                      #   value would stop driving toward the furthest reachable path point too
#                                      #   early and hand off to the goal critics prematurely (weak approach).
#                                      #   0.6 keeps it tracking the path until GoalCritic legitimately takes over.
#       PathAngleCritic:        # mode 0 = FORWARD_PREFERENCE. The key "rotate to face the path" term: mode 0
#         enabled: true         #   measures heading strictly vs the path point bearing (no +/-pi mirror), so a
#         cost_power: 1         #   path point behind the robot stays costly until the body rotates to face it.
#         cost_weight: 2.0      #   (mode 1 takes min(yaw, yaw+pi), giving reverse a free heading pass.) Weight
#         offset_from_furthest: 4  #  kept modest: raising it widens the near-pi "all candidates costly" zone
#         threshold_to_consider: 0.5  # and re-triggers dithering.
#         max_angle_to_furthest: 1.0
#         mode: 0
#       TwirlingCritic:         # penalise aimless spin. The runtime param names are cost_power/cost_weight
#         enabled: true         #   (the twirling_cost_* names are silently ignored). Weight kept modest: too
#         cost_power: 1         #   high taxes the wz of a purposeful rotate-to-face and re-creates dithering.
#         cost_weight: 2.0      #   2.0 still damps idle spinning; circling-at-goal is already prevented by
#                               #   goal_checker yaw_goal_tolerance 3.15 (no terminal yaw).

    # ---- ACTIVE CONTROLLER: DWB ----
    FollowPath:
      # DWB local planner (dwb_core::DWBLocalPlanner). Config is deliberately lean: the sim control loop
      # can collapse to 1-4 Hz, so DWB cost (vx_samples * vy_samples * vtheta_samples) must stay well below
      # the default 20*5*20=2000.
      # Docs: https://docs.nav2.org/configuration/packages/configuring-dwb-controller.html
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false       # default. Keep OFF on CPU-starved sim (no debug marker publishing).

      # --- trajectory generator (holonomic-capable via XYTheta vy sampling) --------------------------
      trajectory_generator_name: "dwb_plugins::StandardTrajectoryGenerator"  # default & holonomic-capable;
                                            #   cheaper than LimitedAccelGenerator (no per-cycle accel-bound
                                            #   re-derivation). Strafe is enabled by nonzero vy limits + vy_samples,
                                            #   NOT by generator choice.
      sim_time: 1.5                         # < default 1.7. Slow robot (vx_max 0.26) needs only a short rollout;
                                            #   shorter horizon = fewer integration steps = less compute.
      discretize_by_time: false             # default. Project by distance granularity (cheaper, fewer points
                                            #   than time-stepping a long-ish horizon).
      linear_granularity: 0.05              # < default 0.5; matches the canonical example. 0.5 m steps on a
                                            #   0.26 m/s * 1.5 s ≈ 0.39 m rollout would give ~1 point — too coarse
                                            #   to score obstacles. 0.05 m keeps the path resolved without
                                            #   exploding sample count (it sets points-per-trajectory, not count).
      angular_granularity: 0.025            # default. Adequate angular resolution for scoring turns.
      include_last_point: true              # default.
      limit_vel_cmd_in_traj: false          # default.

      # --- kinematic limits (Go2 trot envelope; identical to the MPPI block it replaces) -------------
      min_vel_x: -0.15                      # reverse enabled — sim L1 is full 360 deg so the costmap sees behind.
                                            #   *** REAL ROBOT: front-biased L1; set 0.0 before any real deploy. ***
                                            #   (default 0.0 = no reverse.)
      max_vel_x: 0.26                       # forward trot max (default 0.0 = robot can't move; must be set).
      min_vel_y: 0.0                        # differential: lateral velocity disabled. With vy sampled, DWB
                                            #   reduces path-distance by strafing sideways instead of rotating
                                            #   to face the path (crabs in x+y, won't turn, unstable). vy=0 forces
                                            #   the controller to rotate to change direction, then drive forward.
      max_vel_y: 0.0                        # differential. See min_vel_y. Restore a small band (e.g. +/-0.05)
                                            #   + vy_samples 3 if you want holonomic sidesteps back.
      max_vel_theta: 0.7                    # yaw authority to rotate and align with the path promptly instead
                                            #   of lagging the path tangent (default 0.0).
      min_speed_xy: 0.0                     # default. No minimum translational speed (allow pure rotation/stop).
      max_speed_xy: 0.26                    # = max_vel_x now that vy=0 (combined |x,y| cap; hypot(0.26,0)=0.26).
      min_speed_theta: 0.0                  # default.
      acc_lim_x: 0.6                        # fwd accel — REALISTIC Go2 trot (default 0.0; example uses 2.5,
                                            #   far too aggressive for this slow gait).
      acc_lim_y: 0.6                        # lateral accel for holonomic strafe (default 0.0).
      acc_lim_theta: 1.0                    # yaw accel (default 0.0; example 3.2 is too brisk for the Go2).
      decel_lim_x: -0.6                     # fwd decel, mirrors acc_lim_x (default 0.0; example -2.5).
      decel_lim_y: -0.6                     # lateral decel, mirrors acc_lim_y (default 0.0).
      decel_lim_theta: -1.0                 # yaw decel, mirrors acc_lim_theta (default 0.0; example -3.2).

      # --- velocity sampling — LEAN for the CPU-starved sim ------------------------------------------
      # DWB cost ≈ vx_samples * vy_samples * vtheta_samples. Default 20*5*20 = 2000 trajectories/cycle would
      # starve this loop. 8*3*10 = 240 is ~8x cheaper than default while still covering fwd/reverse, a left/
      # centre/right strafe, and a usable spread of turn rates.
      vx_samples: 8                         # < default 20. Spans reverse..forward at coarse but sufficient steps.
      vy_samples: 1                         # vy disabled (differential), so only the zero-strafe column is
                                            #   sampled. (Cost vx*vy*vtheta = 8*1*20 = 160 trajectories/cycle.)
      vtheta_samples: 20                    # finer yaw resolution = smoother turning, less overshoot/
                                            #   oscillation. Affordable since vy_samples=1.

      # --- critics & scales --------------------------------------------------------------------------
      # Goal: follow the CENTRED global path, avoid obstacles, and DO NOT spin-in-place at goals (frontier
      # goals carry no meaningful yaw; controller-level yaw_goal_tolerance is 3.15 = heading ignored).
      # Twirling is the holonomic anti-spin critic — it penalises needless rotation while translating so the
      # omni Go2 doesn't twirl en route. RotateToGoal is kept but is GATED to the goal region and, because the
      # goal checker accepts ANY final heading (yaw_tol 3.15), it never forces a terminal spin. Default
      # namespace ["dwb_critics"] is used implicitly.
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist", "PreferForward", "Twirling"]
      short_circuit_trajectory_evaluation: true   # default. Stop scoring once a best is found — saves compute.
      BaseObstacle.scale: 0.02              # matches canonical example (default 1.0 over-weights raw cost cells;
                                            #   0.02 is the doc-recommended balance against the path/goal critics).
      PathAlign.scale: 40.0                 # strong heading-alignment so the robot rotates to follow the
                                            #   generated path faithfully instead of tracking it at a slight
                                            #   angle. Kept modest to avoid over-rotation/oscillation.
                                            #   (default/controller-page 32.)
      PathAlign.forward_point_distance: 0.3 # ~0.3 m (near default 0.325) projects the scored point far enough
                                            #   ahead that it rewards heading along the path (face-and-go); a
                                            #   short distance lets a pure strafe satisfy it (crab-indifferent).
      PathDist.scale: 32.0                  # controller-page override default — keep the body ON the path (centred).
      GoalAlign.scale: 24.0                 # controller-page override default.
      GoalAlign.forward_point_distance: 0.3 # same heading-alignment rationale as PathAlign: rewards pointing
                                            #   the body at the goal rather than sliding laterally onto it.
      GoalDist.scale: 24.0                  # controller-page override default — progress toward the goal.
      RotateToGoal.scale: 32.0              # example value — only ACTIVE within xy tolerance of the goal; with
                                            #   yaw_goal_tolerance 3.15 it has no heading to chase, so no spin.
      RotateToGoal.slowing_factor: 5.0      # default. Slows translation while in the goal-rotation phase.
      RotateToGoal.lookahead_time: -1.0     # default (disabled). No forward collision lookahead for the rotation.
      PreferForward.scale: 1.0              # PreferForward's cost is scale*theta_scale*|yaw| -- it penalises
                                            #   turning, it does not reward it. A high scale taxes |yaw| so hard
                                            #   the robot refuses to rotate and strafes instead. At 1*1 it only
                                            #   mildly discourages reverse / in-place crab, leaving PathAlign free
                                            #   to drive the turn.
      PreferForward.penalty: 1.0            # flat tax on reverse / low-vx-non-rotating (crab).
      PreferForward.strafe_x: 0.15          # vx below this (+ low wz) = crab -> taxed. > default 0.1 to also tax
                                            #   mid-vx diagonals; low enough a rotate-in-place to face the goal is
                                            #   allowed.
      PreferForward.strafe_theta: 0.2       # |wz| above this = purposeful turn (rewarded) not crab (taxed). default.
      PreferForward.theta_scale: 1.0        # multiplies the |yaw| rotation penalty (not a reward). Low so
                                            #   following a curved path isn't taxed.
      Twirling.scale: 0.0                   # off. Twirling penalises yaw-while-translating, but with vy=0 the
                                            #   robot MUST yaw-while-translating to follow a curved path, so this
                                            #   critic would directly fight path following. vy=0 already prevents
                                            #   the omni-twirl it guards against. Re-enable (~1.0) only if the
                                            #   robot visibly spins without making progress.
      Oscillation.scale: 1.0                # default. Prevents back-and-forth dithering.

      transform_tolerance: 3.0              # absorbs rare transient map->odom spikes. Nav2 aborts a goal on the
                                            #   FIRST TF error (no retry), so a single transient lag over a tight
                                            #   tolerance kills an in-flight goal. 3.0 s rides through transients
                                            #   while keeping a bounded dead-TF halt (~0.78 m at 0.26 m/s).
                                            #   Background: rtabmap broadcasts map->odom from a 20 Hz thread
                                            #   stamped now()+tf_tolerance; under CPU load its /clock callback
                                            #   starves, its now() lags, the broadcast stamp is late, and Nav2
                                            #   reports "Transform data too old" and aborts goals mid-path. The
                                            #   structural fix is cutting CPU load (camera decoupled from rtabmap
                                            #   in rtabmap_slam.launch.py); this tolerance covers the residual lag.
                                            #   If aborts recur at a tight value, the CPU/clock starvation is back
                                            #   (check /camera/image_raw hz + rtabmap CPU) rather than a tolerance
                                            #   problem.

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 1.0     # accept a path ending within 1m of the frontier goal (fewer plan failures)
      use_astar: false   # Dijkstra: explores the full inflated costmap -> smoother, centred paths. A* biases
                         # toward the goal and can shortcut along walls (a known wall-hugging cause).
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    # Recovery behaviors (fired by the BT recovery subtree, and reusable on the REAL Go2):
    #   backup           — reverse straight out when wedged against a wall (the key escape)
    #   spin             — rotate in place to find a clear heading
    #   drive_on_heading — nudge forward along a clear heading after backing up
    #   wait             — pause for a moving obstacle (warehouse has walking people) to clear
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    simulate_ahead_time: 1.5
    max_rotational_vel: 0.5
    min_rotational_vel: 0.2
    rotational_acc_lim: 1.0
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 3.0   # absorb rtabmap map->odom lag spikes (same TF/time fix as the controller)

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.30, 0.15, 0.8]    # y enabled for omni (consistent with DWB); note: smoother not launched
    min_velocity: [-0.15, -0.15, -0.8]
    max_accel: [1.0, 0.6, 2.0]
    max_decel: [-1.0, -0.6, -2.0]
    odom_topic: "/odom"
    odom_duration: 0.1

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 3.0   # controller_server transforms the goal into this costmap's frame using
                              #   this tolerance as the tf2 wait-timeout; rtabmap map->odom lags sim-now, so at
                              #   the 0.3 s default the goal transform throws "extrapolation into the future" and
                              #   aborts every goal. 3.0 s lets map->odom catch up. (TF/time fix.)
      update_frequency: 5.0
      publish_frequency: 2.0
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      footprint: "[[0.35,0.155],[0.35,-0.155],[-0.35,-0.155],[-0.35,0.155]]"   # 0.70x0.31 — Unitree Go2
      # STANDARD standing footprint (real-robot spec). Robustly bounds the modeled body: trunk 0.376m,
      # the front L1/camera head at x=+0.30, and the leg stance/swing (hips x=±0.19, feet y≈±0.14).
      # Width 0.31 is the aisle-limiting dimension; +footprint_padding below.
      footprint_padding: 0.05
      # RTAB-Map variant: NO static_layer here. rtabmap publishes /map sparsely (only on new graph
      # nodes), so a StaticLayer subscribed to it stalls with "no map received" -> the WHOLE local
      # costmap "times out waiting for update" -> DWB never gets a costmap -> aborts every goal -> robot
      # frozen. Walls for local collision-checking come from the obstacle_layer (/scan, 10Hz, reliable).
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan camera_cloud
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          obstacle_max_range: 6.0
        # Forward depth-camera cloud: catches LOW obstacles (pallets, totes, boxes) that the DOWN-PITCHED L1
        # LiDAR misses in its near-field blind spot (it raked over / cleared them and the robot drove in).
        # min/max_obstacle_height are in the GLOBAL frame (true z above ground), so the floor (z<0.12) is
        # rejected regardless of the legged robot's gait pitch -- a base_link height band could not (the body
        # pitches, so the floor's base_link-z drifts). /camera/points is bridged from the gz rgbd_camera.
        camera_cloud:
          topic: /camera/points
          data_type: "PointCloud2"
          min_obstacle_height: 0.12
          max_obstacle_height: 1.5
          clearing: true
          marking: true
          obstacle_max_range: 4.0    # camera depth reliable to ~4 m; plenty of warning before collision
          raytrace_max_range: 5.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0     # LOW = wide, gentle gradient -> a cost basin that CENTRES the path in
                                     # corridors. A high factor (Nav2 default 10) is the classic wall-hugger.
        inflation_radius: 0.55       # sized so narrow maze corridors keep a clear lane: a larger radius fills
                                     # them edge-to-edge (gradients from both walls meet, no clear lane, planner
                                     # stuck at the corridor mouth). Still centres the path in a corridor while
                                     # keeping clearance off the footprint edge.

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link
      transform_tolerance: 3.0   # absorb rtabmap map->odom lag spikes (same TF/time fix as the controller)
      update_frequency: 1.0
      publish_frequency: 1.0
      resolution: 0.05
      track_unknown_space: true
      always_send_full_costmap: false  # removes a source of executor contention behind the bt_navigator goal-ack
                                       # timeout (see default_server_timeout note): the planner_server's single
                                       # executor serializing+publishing this full ~270k-cell OccupancyGrid every
                                       # second is a periodic spike that can push a ComputePathToPose goal-accept
                                       # past its budget and abort a valid goal. In localization mode the global
                                       # map is static, so republishing the whole grid every cycle buys nothing --
                                       # false = publish full once then only changed regions via
                                       # /global_costmap/costmap_updates, shrinking the executor busy window. The
                                       # costmap topic stays latched (transient_local QoS) so late joiners (RViz)
                                       # still get the full grid. Update-only publishing is standard Nav2 behavior
                                       # and handles a growing SLAM map fine.
      # RTAB-Map variant (Go2-Inspector architecture): the global costmap sizes itself to rtabmap's /map,
      # which now has real free cells (Grid/Sensor=0). The static_layer uses that loop-closure-corrected
      # grid, so the planner and the frontier_explorer (which reads /map directly) share ONE consistent
      # map. The obstacle_layer (/scan) adds live obstacles on top. map->odom localization is rtabmap's.
      footprint: "[[0.35,0.155],[0.35,-0.155],[-0.35,-0.155],[-0.35,0.155]]"   # 0.70x0.31 — Unitree Go2
      # STANDARD standing footprint (real-robot spec). Robustly bounds the modeled body: trunk 0.376m,
      # the front L1/camera head at x=+0.30, and the leg stance/swing (hips x=±0.19, feet y≈±0.14).
      # Width 0.31 is the aisle-limiting dimension; +footprint_padding below.
      footprint_padding: 0.05
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan camera_cloud
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          obstacle_max_range: 6.0
        # Same forward depth-camera low-obstacle source as the local costmap (see note there) so the GLOBAL
        # planner also routes around pallets/totes the LiDAR misses. Global-frame height filter rejects floor.
        camera_cloud:
          topic: /camera/points
          data_type: "PointCloud2"
          min_obstacle_height: 0.12
          max_obstacle_height: 1.5
          clearing: true
          marking: true
          obstacle_max_range: 4.0
          raytrace_max_range: 5.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0     # LOW = wide, gentle gradient -> a cost basin that CENTRES the path in
                                     # corridors. A high factor (Nav2 default 10) is the classic wall-hugger.
        inflation_radius: 0.65       # wider than the local costmap so the global planner doesn't cut corners
                                     # (hug walls): zero-cost cells just outside a smaller radius let NavFn
                                     # shortcut at corners; the wider inflated zone forces it through higher-cost
                                     # cells there. Risk: corridors narrower than ~1.35m may become impassable
                                     # (planner returns no path); reduce toward 0.60 if that happens. The local
                                     # costmap stays at 0.55 for responsive real-obstacle avoidance.

# NOTE: go2_bringup/nav2.launch.py deliberately does NOT launch the collision_monitor (under
# navigation_launch.py it force-starts and aborted lifecycle bringup here), so this block is INERT in our
# stack -- controller_server publishes /cmd_vel directly and CHAMP consumes it. Because nothing here
# protects motion, the zone_sweeper's open-loop strafe SELF-GUARDS via a /scan lateral-clearance gate
# (zone_sweeper.py _lateral_clear). Config below is unused unless a future bringup re-enables the chain.
collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    enable_stamped_cmd_vel: false      # CHAMP subscribes geometry_msgs/Twist, not TwistStamped
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: False
      enabled: True
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      min_height: 0.15
      max_height: 2.0
      enabled: True

# Path smoother — bt_navigator's default NavigateToPose BT calls SmoothPath (smoother_server).
smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True
